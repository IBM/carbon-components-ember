name: 'PR Preview Deployment'

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    if: |
      github.event_name == 'pull_request' && 
      contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Build docs app
        run: |
          cd docs-app
          pnpm build
          
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          
      - name: Deploy to gh-pages
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          DEPLOY_DIR="gh-pages/versions/pr-${PR_NUMBER}"
          
          # Create directory structure
          mkdir -p "$DEPLOY_DIR"
          
          # Copy built docs
          cp -r docs-app/dist/* "$DEPLOY_DIR/"
          
          # Update index with PR link
          cd gh-pages
          
          # Create or update versions index
          if [ ! -f "versions/index.html" ]; then
            cat > versions/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>Carbon Components Ember - PR Previews</title>
            <style>
              body { font-family: 'IBM Plex Sans', sans-serif; padding: 2rem; }
              h1 { color: #161616; }
              ul { list-style: none; padding: 0; }
              li { margin: 0.5rem 0; }
              a { color: #0f62fe; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>PR Preview Deployments</h1>
            <ul id="pr-list"></ul>
            <script>
              // This will be populated by the workflow
            </script>
          </body>
          </html>
          EOF
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy PR #${PR_NUMBER} preview" || echo "No changes to commit"
          git push
          
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/versions/pr-${prNumber}/`;
            
            const comment = `## 🚀 Preview Deployment
            
            Your changes have been deployed to a preview environment:
            
            **Preview URL:** ${previewUrl}
            
            This preview will be automatically updated when you push new commits to this PR.
            It will be removed when the PR is closed or merged.`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Preview Deployment')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }

  cleanup-preview:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          
      - name: Remove preview deployment
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          DEPLOY_DIR="versions/pr-${PR_NUMBER}"
          
          if [ -d "$DEPLOY_DIR" ]; then
            rm -rf "$DEPLOY_DIR"
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Remove PR #${PR_NUMBER} preview" || echo "No changes to commit"
            git push
          fi
          
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            
            const comment = `## 🧹 Preview Cleanup
            
            The preview deployment for this PR has been removed.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });