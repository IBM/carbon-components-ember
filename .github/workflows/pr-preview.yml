name: PR Docs Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, closed]

jobs:
  deploy-preview:
    name: Deploy Preview
    if: contains(github.event.pull_request.labels.*.name, 'preview') && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm i -g pnpm

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: |
          pnpm install
          (cd ./carbon-components-ember && pnpm create-autogenerated-files)

      - name: Build docs-app
        run: DOCS_URL=pr-previews/pr-${{ github.event.pull_request.number }} pnpm run build

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: gh-pages
          path: gh-pages

      - name: Deploy to gh-pages
        run: |
          mkdir -p $GITHUB_WORKSPACE/gh-pages/pr-previews/pr-${{ github.event.pull_request.number }}
          cp -r ./docs-app/dist/* $GITHUB_WORKSPACE/gh-pages/pr-previews/pr-${{ github.event.pull_request.number }}/
          cd $GITHUB_WORKSPACE/gh-pages
          git config --global user.name 'Patrick Pircher'
          git config --global user.email 'patricklx@users.noreply.github.com'
          git add .
          git diff --staged --quiet || git commit -m "Deploy docs preview for PR #${{ github.event.pull_request.number }} (${{ github.event.pull_request.head.sha }})"
          git push

      - name: Post or update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-docs-preview -->';
            const body = `${marker}
            ## 📖 Docs Preview

            🔗 **Preview URL:** https://ibm.github.io/carbon-components-ember/pr-previews/pr-${{ github.event.pull_request.number }}/

            _Built from commit ${{ github.event.pull_request.head.sha }}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.pull_request.number }},
                body,
              });
            }

  cleanup-preview:
    name: Cleanup Preview
    if: |
      (github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'preview')) ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'preview')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: gh-pages
          path: gh-pages

      - name: Remove preview from gh-pages
        run: |
          cd $GITHUB_WORKSPACE/gh-pages
          if [ -d "pr-previews/pr-${{ github.event.pull_request.number }}" ]; then
            git config --global user.name 'Patrick Pircher'
            git config --global user.email 'patricklx@users.noreply.github.com'
            git rm -rf pr-previews/pr-${{ github.event.pull_request.number }}
            git commit -m "Remove docs preview for PR #${{ github.event.pull_request.number }}"
            git push
          fi

      - name: Update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-docs-preview -->';
            const body = `${marker}
            ## 📖 Docs Preview

            ~~Preview has been removed~~ (PR closed or \`preview\` label removed).`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
