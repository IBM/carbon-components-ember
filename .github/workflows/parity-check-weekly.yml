name: 'Weekly Parity Check'

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

defaults:
  run:
    shell: 'bash'

jobs:
  parity-check:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'write'
      issues: 'write'
      pull-requests: 'write'

    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0
          token: '${{ secrets.GITHUB_TOKEN }}'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20.x'

      - name: 'Install dependencies'
        run: |
          cd scripts
          npm install @octokit/rest

      - name: 'Run parity check'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          GITHUB_REPOSITORY: '${{ github.repository }}'
          CREATE_ISSUES: 'true'
        run: |
          node scripts/parity-check.mjs

      - name: 'Open or update PR with parity data'
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="chore/update-parity-data"

          if [[ ! -f .parity-check-data.json ]]; then
            echo "No parity data file generated, nothing to do"
            exit 0
          fi

          git add .parity-check-data.json
          git add PARITY_REPORT.md || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git checkout -B "$BRANCH_NAME"
          git commit -m "chore: update parity check data [skip ci]"
          git push --force origin "$BRANCH_NAME"

          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number')

          if [[ -n "$EXISTING_PR" ]]; then
            echo "Updated existing PR #$EXISTING_PR"
          else
            gh pr create \
              --title "chore: update parity check data" \
              --body "Automated update of \`.parity-check-data.json\` and \`PARITY_REPORT.md\` from the weekly parity check." \
              --base main \
              --head "$BRANCH_NAME" \
              --label "parity-check"
          fi

      - name: 'Upload parity report'
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'parity-report'
          path: 'PARITY_REPORT.md'
          retention-days: 90
